name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # npm ci alone doesn't verify prebuilds: on runners with a toolchain,
      # better-sqlite3 falls back to node-gyp and compiles silently — which end
      # users can't do. Re-fetch the prebuild explicitly (no fallback) and load it.
      - name: Verify better-sqlite3 prebuild
        shell: bash
        run: |
          cd node_modules/better-sqlite3
          rm -rf build
          ../.bin/prebuild-install --verbose
          cd ../..
          node -e "require('better-sqlite3')(':memory:').prepare('select 1').get(); console.log('prebuild OK')"
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
