name: Release

# Tag a version (git tag v0.2.0 && git push --tags) → build, gate, publish.
# npm is the entire distribution and update channel (deep-dive §5).
# Publishing uses npm trusted publishing (OIDC): no token secret — the
# trusted publisher (this repo + workflow) is configured on npmjs.com.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Install + gates run on the runner's bundled npm 10 — npm 12 skips the
      # install scripts that build better-sqlite3's native binding.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      # Trusted publishing needs npm >= 11.5, so upgrade for this step only.
      # prepack runs `npm run build`, so publish packs a fresh bin/dist/web/dist.
      # publishConfig sets access:public + provenance (repo must stay public —
      # the registry rejects provenance publishes from private repos).
      - run: npm install -g npm@latest
      - run: npm publish
